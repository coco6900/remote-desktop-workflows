name: macOS VNC - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 9999

    steps:
      - name: Install Cloudflared
        run: |
          brew install cloudflared
          echo "✅ Cloudflared Installé !"

      - name: Force Virtual Display & Enable VNC
        run: |
          # 1. Activation du partage d'écran (Remote Management)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers
          
          # 2. Forçage du mot de passe 'P@ssw0rd123!' (Mode Legacy VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw P@ssw0rd123!
          
          # 3. Correctif pour l'écran noir (Force l'affichage de l'icône de découverte)
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysShowDiscoveryHugeIcon -bool true
          
          # 4. Désactivation du verrouillage automatique pour éviter la veille
          sudo defaults write com.apple.screensaver idleTime 0
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
          echo "✅ VNC forcé avec mot de passe 'P@ssw0rd123!'"

      - name: Start Cloudflare Tunnel
        run: |
          echo "============================================"
          echo "🚀 macOS VNC - CLOUDFLARE TUNNEL"
          echo "============================================"
          echo "1. Récupère l'URL .trycloudflare.com ci-dessous"
          echo "2. Sur ton PC, lance le terminal CMD avec cette URL"
          echo "3. Connecte-toi via TightVNC sur localhost::5900"
          echo "============================================"
          cloudflared tunnel --url tcp://localhost:5900
