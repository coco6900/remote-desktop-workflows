name: macOS VNC - CLOUDFLARE FINAL
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install Cloudflared
        run: brew install cloudflared

      - name: Enable VNC & Force Graphics
        run: |
          # 1. Active le partage d'écran
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw P@ssw0rd123!

          # 2. COMMANDE MAGIQUE : Force le WindowServer à simuler une activité
          # On demande au Mac de prendre une capture d'écran (ça force le moteur graphique à s'allumer)
          screencapture /tmp/test.png
          
          # 3. Empêche la mise en veille
          caffeinate -u -t 3600 & 

      - name: Start Tunnel
        run: |
          echo "🚀 Copie l'URL ci-dessous..."
          cloudflared tunnel --url tcp://localhost:5900
