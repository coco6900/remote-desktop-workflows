name: macOS VNC - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 9999

    steps:
      - name: Install Cloudflared
        run: |
          brew install cloudflared
          echo "✅ Cloudflared Installed!"

      - name: Enable VNC/Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers
          echo "✅ VNC Enabled!"

      - name: Set VNC Password
        run: |
          # Configuration du mot de passe pour l'accès VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw P@ssw0rd123!
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
          echo "✅ VNC Password Set!"

      - name: Start Cloudflare Tunnel
        run: |
          echo "============================================"
          echo "🚀 macOS VNC - CLOUDFLARE TUNNEL"
          echo "============================================"
          # On lance cloudflared directement pour voir l'URL dans les logs
          cloudflared tunnel --url tcp://localhost:5900
